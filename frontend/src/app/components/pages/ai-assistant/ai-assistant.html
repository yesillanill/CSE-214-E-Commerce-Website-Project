<div class="chat-page">
  <div class="chat-header">
    <div class="header-icon">🤖</div>
    <div class="header-info">
      <h2>AI Assistant</h2>
      <span class="status-badge">
        <span class="status-dot"></span>
        Online
      </span>
    </div>
  </div>

  <div class="chat-messages" #chatContainer>
    @for(msg of messages; track msg.timestamp) {
      <div class="message" [class.user-message]="msg.role === 'user'" [class.assistant-message]="msg.role === 'assistant'">
        <div class="message-avatar">
          @if(msg.role === 'assistant') {
            <span>🤖</span>
          } @else {
            <span>👤</span>
          }
        </div>
        <div class="message-content">
          <div class="message-bubble" (click)="onMessageClick($event)">
            @if(msg.role === 'assistant') {
              <div class="message-text" [innerHTML]="renderMarkdown(msg.content)"></div>
            } @else {
              <p class="message-text">{{ msg.content }}</p>
            }
          </div>
          <span class="message-time">{{ msg.timestamp | date:'HH:mm' }}</span>
        </div>
      </div>
    }

    @if(isLoading) {
      <div class="message assistant-message">
        <div class="message-avatar"><span>🤖</span></div>
        <div class="message-content">
          <div class="message-bubble typing-indicator">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="chat-input-area">
    <div class="input-wrapper">
      <textarea
        [(ngModel)]="userInput"
        (keydown)="onKeyDown($event)"
        placeholder="Bir soru sorun... (ör: Samsung ürünleri neler?)"
        rows="1"
        class="chat-input"
        [disabled]="isLoading"
      ></textarea>
      <button
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="!userInput.trim() || isLoading"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>
