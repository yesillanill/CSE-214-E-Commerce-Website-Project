<div class="product-form-page">
  <div class="form-header">
    <button class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      Back to Inventory
    </button>
    <h1 class="form-title">Edit Product</h1>
  </div>

  @if(isLoading) {
    <div class="loading-card">
      <div class="skeleton-line wide"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line narrow"></div>
    </div>
  } @else {
    <form class="product-form" (ngSubmit)="onSubmit()" #productForm="ngForm">
      <div class="form-grid">
        <div class="form-group full-width">
          <label for="name">Product Name</label>
          <input id="name" type="text" [(ngModel)]="product.name" name="name">
        </div>

        <div class="form-group full-width">
          <label for="description">Description</label>
          <textarea id="description" [(ngModel)]="product.description" name="description" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label for="price">Price (TL)</label>
          <input id="price" type="number" [(ngModel)]="product.price" name="price" min="0" step="0.01">
        </div>

        <div class="form-group">
          <label for="stock">Stock</label>
          <input id="stock" type="number" [(ngModel)]="product.stock" name="stock" min="0">
        </div>

        <div class="form-group full-width">
          <label for="img">Image URL</label>
          <input id="img" type="text" [(ngModel)]="product.img" name="img">
        </div>

        @if(product.img) {
          <div class="image-preview full-width">
            <img [src]="product.img" alt="Preview" (error)="product.img = ''">
          </div>
        }

        <div class="readonly-info full-width">
          <div class="info-chip" *ngIf="categoryName">
            <span class="info-label">Category:</span> {{ categoryName }}
          </div>
          <div class="info-chip" *ngIf="brandName">
            <span class="info-label">Brand:</span> {{ brandName }}
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="goBack()">Cancel</button>
        <button type="submit" class="submit-btn" [disabled]="!hasChanges() || isSaving">
          @if(isSaving) {
            <span class="spinner"></span> Updating...
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Update Product
          }
        </button>
      </div>
    </form>
  }
</div>
