services:
  # ── PostgreSQL Database (optional — only for clean/fresh environments) ────
  # Start with: docker compose --profile fresh-db up -d
  db:
    image: postgres:16-alpine
    container_name: ecommerce-db
    restart: unless-stopped
    profiles:
      - fresh-db
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ── Spring Boot Backend ───────────────────────────────────────────────────
  # Connects to host machine's PostgreSQL (same data as local dev)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/ecommerce
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: dGhpc0lzQVNlY3VyZVNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNg==
      JWT_EXPIRATION: "86400000"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-AIzaSyCe--1oxDBHA19jWzEFIn6AXCIc-eVtFw8}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-sk_test_51TLmXwFenUoMJgzKNwUVD2hY4iNlU7vQZY7uqeFZbZ9r3CmiSPUVHrqoqGjNRdA7rFQGmSnbKgA0PqLSNK6jvjqZ00u9xJZIcO}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_fa67f3ba360f4efcfef1cf638eeb609ad3272ba9cc0d721ff2ed3a23966b7678}
      COINBASE_API_KEY: ${COINBASE_API_KEY:-c42eba51-e745-465e-9dd8-f53c05916ff2}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-your_paypal_client_id_here}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-your_paypal_secret_here}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      COD_MAX_AMOUNT: ${COD_MAX_AMOUNT:-500.00}
      AI_CHATBOT_URL: http://ai_chatbot:8000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ecommerce-net

  # ── Angular Frontend (nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ── AI Chatbot (FastAPI) ──────────────────────────────────────────────────
  ai_chatbot:
    build:
      context: ./ai_chatbot
      dockerfile: Dockerfile
    container_name: ecommerce-ai-chatbot
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-AIzaSyCe--1oxDBHA19jWzEFIn6AXCIc-eVtFw8}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SPRING_BASE_URL: http://backend:8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ecommerce-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ecommerce-net:
    driver: bridge
