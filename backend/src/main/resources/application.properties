spring.application.name=ecommerce
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql = true;

# GÜVENLİK: API key'ler environment variable'dan okunuyor
gemini.api.key=${GEMINI_API_KEY:}

# JWT Configuration — secret environment variable'dan okunuyor
jwt.secret=${JWT_SECRET:dGhpc0lzQVNlY3VyZVNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNg==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# === Ödeme Sistemi Ayarları ===

# Stripe Ayarları — secret key'ler environment variable'dan okunuyor
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# PayPal Sandbox Ayarları
paypal.client.id=${PAYPAL_CLIENT_ID:YOUR_PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET:YOUR_PAYPAL_SECRET}
paypal.mode=${PAYPAL_MODE:sandbox}

# Coinbase Commerce Ayarları
coinbase.api.key=${COINBASE_API_KEY:}

# Kapıda Ödeme Ayarları
cod.max.amount=${COD_MAX_AMOUNT:500.00}

# AI Chatbot (Python FastAPI) URL
ai.chatbot.url=${AI_CHATBOT_URL:http://127.0.0.1:8000}
